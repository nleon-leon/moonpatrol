<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moon Patrol Mobile</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body {
            background-color: #030310;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background-color: #050515;
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <canvas id="pantallaJuego"></canvas>

    <script>
        const canvas = document.getElementById("pantallaJuego");
        const ctx = canvas.getContext("2d");

        function ajustarPantalla() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Fijar la línea del suelo lunar según el alto de la pantalla
            sueloY = canvas.height * 0.75;
            if(buggy) buggy.y = sueloY - buggy.alto;
        }

        // --- AUDIO RETRO (Web Audio API) ---
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function iniciarAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

        function sonarDisparo() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "square";
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1); // Pitido hacia arriba
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function sonarSalto() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "triangle";
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(500, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        }

        function sonarExplosion() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "sawtooth";
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        // VARIABLES DEL JUEGO
        let estado = "JUGANDO";
        let score = 0;
        let vidas = 3;
        let sueloY = 0;
        let velocidadMundo = 4;

        // Fondos Paralaje (Scroll infinito a diferentes velocidades)
        let fondoLejosX = 0;
        let fondoCercaX = 0;

        // El Buggy Lunar
        const buggy = {
            x: 80,
            y: 0,
            ancho: 55,
            alto: 30,
            vy: 0,
            gravedad: 0.6,
            potenciaSalto: -12,
            enSuelo: false,
            puedeDisparar: true,
            cadencia: 250
        };

        let balas = [];       // Balas verticales y horizontales
        let obstaculos = [];  // Cráteres y piedras en el suelo
        let ovnis = [];       // Enemigos voladores
        let explosiones = [];

        let tiempoUltimoObstaculo = 0;
        let tiempoUltimoOvni = 0;

        // CONTROLES TÁCTILES DIVIDIDOS
        // Mitad izquierda de la pantalla = SALTAR | Mitad derecha = DISPARAR
        window.addEventListener("touchstart", (e) => {
            iniciarAudio();
            if (estado === "GAMEOVER") { reiniciarJuego(); return; }

            for (let i = 0; i < e.changedTouches.length; i++) {
                let toque = e.changedTouches[i];
                if (toque.clientX < window.innerWidth / 2) {
                    // Acción de SALTAR
                    if (buggy.enSuelo && estado === "JUGANDO") {
                        buggy.vy = buggy.potenciaSalto;
                        buggy.enSuelo = false;
                        sonarSalto();
                    }
                } else {
                    // Acción de DISPARAR (Doble ráfaga: frente y arriba)
                    if (buggy.puedeDisparar && estado === "JUGANDO") {
                        // Bala al frente
                        balas.push({ x: buggy.x + buggy.ancho, y: buggy.y + buggy.alto / 2, vx: 10, vy: 0, tipo: "FRENTE" });
                        // Bala hacia arriba
                        balas.push({ x: buggy.x + buggy.ancho / 2, y: buggy.y, vx: 0, vy: -10, tipo: "ARRIBA" });
                        
                        sonarDisparo();
                        buggy.puedeDisparar = false;
                        setTimeout(() => buggy.puedeDisparar = true, buggy.cadencia);
                    }
                }
            }
        }, { passive: false });

        function crearExplosion(x, y, color) {
            for (let i = 0; i < 8; i++) {
                explosiones.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    radio: Math.random() * 3 + 2,
                    vida: 15,
                    color: color || "#ffaa00"
                });
            }
            if (navigator.vibrate) navigator.vibrate(20);
        }

        function actualizar(tiempoActual) {
            if (estado !== "JUGANDO") return;

            // Avanzar Fondos Paralaje
            fondoLejosX -= velocidadMundo * 0.15;
            fondoCercaX -= velocidadMundo * 0.5;
            if (fondoLejosX <= -canvas.width) fondoLejosX = 0;
            if (fondoCercaX <= -canvas.width) fondoCercaX = 0;

            // Sumar score pasivo por avanzar por la luna
            score++;

            // FÍSICAS DEL BUGGY (Salto y Gravedad)
            buggy.vy += buggy.gravedad;
            buggy.y += buggy.vy;

            if (buggy.y >= sueloY - buggy.alto) {
                buggy.y = sueloY - buggy.alto;
                buggy.vy = 0;
                buggy.enSuelo = true;
            }

            // GENERAR OBSTÁCULOS EN EL SUELO (Piedras o Cráteres)
            if (tiempoActual - tiempoUltimoObstaculo > Math.random() * 1500 + 1200) {
                let tipo = Math.random() > 0.5 ? "PIEDRA" : "CRATER";
                obstaculos.push({
                    x: canvas.width + 50,
                    y: sueloY,
                    ancho: tipo === "PIEDRA" ? 25 : 45,
                    alto: tipo === "PIEDRA" ? 25 : 15,
                    tipo: tipo
                });
                tiempoUltimoObstaculo = tiempoActual;
            }

            // GENERAR OVNIS EN EL CIELO
            if (tiempoActual - tiempoUltimoOvni > Math.random() * 2500 + 2000) {
                ovnis.push({
                    x: canvas.width + 40,
                    y: canvas.height * 0.15 + Math.random() * 80,
                    ancho: 40,
                    alto: 20,
                    velocidadX: Math.random() * 2 + 2
                });
                tiempoUltimoOvni = tiempoActual;
            }

            // ACTUALIZAR BALAS
            for (let i = balas.length - 1; i >= 0; i--) {
                balas[i].x += balas[i].vx;
                balas[i].y += balas[i].vy;
                // Borrar si salen de la pantalla
                if (balas[i].x > canvas.width || balas[i].y < 0) balas.splice(i, 1);
            }

            // ACTUALIZAR OBSTÁCULOS
            for (let i = obstaculos.length - 1; i >= 0; i--) {
                obstaculos[i].x -= velocidadMundo;
                
                // Colisión Obstáculo vs Buggy
                let obs = obstaculos[i];
                let buggyAjustadoY = obs.tipo === "CRATER" ? buggy.y + 10 : buggy.y; // El cráter requiere caer dentro

                if (buggy.x < obs.x + obs.ancho &&
                    buggy.x + buggy.ancho > obs.x &&
                    buggy.y + buggy.alto > obs.y - (obs.tipo === "PIEDRA" ? obs.alto : 0) &&
                    buggyAjustadoY < obs.y + obs.alto) {
                    
                    impactoJugador();
                    obstaculos.splice(i, 1);
                    continue;
                }

                if (obs.x < -100) obstaculos.splice(i, 1);
            }

            // ACTUALIZAR OVNIS
            for (let i = ovnis.length - 1; i >= 0; i--) {
                ovnis[i].x -= ovnis[i].velocidadX;

                // Lanzar pequeñas bombas hacia abajo de forma aleatoria
                if (Math.random() < 0.008) {
                    balas.push({ x: ovnis[i].x + 20, y: ovnis[i].y + 20, vx: -2, vy: 5, tipo: "BOMBA" });
                }

                if (ovnis[i].x < -100) ovnis[i].x = canvas.width + 50; // Se regresan si escapan
            }

            // COMPROBAR IMPACTOS DE BALAS CONTRA ENEMIGOS
            for (let b = balas.length - 1; b >= 0; b--) {
                let bala = balas[b];

                // Balas aliadas vs Ovnis
                if (bala.tipo === "ARRIBA") {
                    for (let o = ovnis.length - 1; o >= 0; o--) {
                        let ovni = ovnis[o];
                        if (bala.x > ovni.x && bala.x < ovni.x + ovni.ancho &&
                            bala.y > ovni.y && bala.y < ovni.y + ovni.alto) {
                            
                            crearExplosion(ovni.x + ovni.ancho/2, ovni.y + ovni.alto/2, "#00ffcc");
                            sonarExplosion();
                            ovnis.splice(o, 1);
                            balas.splice(b, 1);
                            score += 500;
                            break;
                        }
                    }
                }
                // Balas aliadas vs Piedras
                else if (bala.tipo === "FRENTE") {
                    for (let o = obstaculos.length - 1; o >= 0; o--) {
                        let obs = obstaculos[o];
                        if (obs.tipo === "PIEDRA" &&
                            bala.x > obs.x && bala.x < obs.x + obs.ancho &&
                            bala.y > obs.y - obs.alto && bala.y < obs.y) {
                            
                            crearExplosion(obs.x + obs.ancho/2, obs.y - obs.alto/2, "#ff5500");
                            sonarExplosion();
                            obstaculos.splice(o, 1);
                            balas.splice(b, 1);
                            score += 200;
                            break;
                        }
                    }
                }
                // Bomba enemiga vs Jugador
                else if (bala.tipo === "BOMBA") {
                    if (bala.x > buggy.x && bala.x < buggy.x + buggy.ancho &&
                        bala.y > buggy.y && bala.y < buggy.y + buggy.alto) {
                        
                        impactoJugador();
                        balas.splice(b, 1);
                    }
                }
            }

            // ACTUALIZAR EXPLOSIONES
            for (let i = explosiones.length - 1; i >= 0; i--) {
                explosiones[i].x += explosiones[i].vx;
                explosiones[i].y += explosiones[i].vy;
                explosiones[i].vida--;
                if (explosiones[i].vida <= 0) explosiones.splice(i, 1);
            }
        }

        function impactoJugador() {
            crearExplosion(buggy.x + buggy.ancho / 2, buggy.y + buggy.alto / 2, "#ff0055");
            sonarExplosion();
            vidas--;
            if (vidas <= 0) {
                estado = "GAMEOVER";
                if (navigator.vibrate) navigator.vibrate([150, 100, 150]);
            }
        }

        function dibujar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. DIBUJAR PARALAJE LEJOS (Montañas lunares distantes)
            ctx.fillStyle = "#121230";
            for (let i = 0; i < 2; i++) {
                let currentX = fondoLejosX + (i * canvas.width);
                ctx.beginPath();
                ctx.moveTo(currentX, sueloY);
                ctx.lineTo(currentX + canvas.width * 0.2, sueloY - 120);
                ctx.lineTo(currentX + canvas.width * 0.5, sueloY - 60);
                ctx.lineTo(currentX + canvas.width * 0.8, sueloY - 150);
                ctx.lineTo(currentX + canvas.width, sueloY);
                ctx.closePath();
                ctx.fill();
            }

            // 2. DIBUJAR PARALAJE CERCA (Colinas de cráteres medianas)
            ctx.fillStyle = "#202050";
            for (let i = 0; i < 2; i++) {
                let currentX = fondoCercaX + (i * canvas.width);
                ctx.beginPath();
                ctx.moveTo(currentX, sueloY);
                ctx.quadraticCurveTo(currentX + canvas.width * 0.25, sueloY - 50, currentX + canvas.width * 0.5, sueloY);
                ctx.quadraticCurveTo(currentX + canvas.width * 0.75, sueloY - 70, currentX + canvas.width, sueloY);
                ctx.closePath();
                ctx.fill();
            }

            // 3. DIBUJAR EL SUELO LUNAR
            ctx.fillStyle = "#3a3a78";
            ctx.fillRect(0, sueloY, canvas.width, canvas.height - sueloY);
            ctx.fillStyle = "#505099";
            ctx.fillRect(0, sueloY, canvas.width, 6); // Capa superior brillante del suelo

            // 4. DIBUJAR OBSTÁCULOS (Piedras o Cráteres vaciados)
            obstaculos.forEach(obs => {
                if (obs.tipo === "PIEDRA") {
                    ctx.fillStyle = "#a85500";
                    ctx.fillRect(obs.x, obs.y - obs.alto, obs.ancho, obs.alto);
                } else if (obs.tipo === "CRATER") {
                    // El cráter se dibuja tapando el suelo de color negro/fondo para simular el hueco
                    ctx.fillStyle = "#050515";
                    ctx.fillRect(obs.x, obs.y, obs.ancho, obs.alto);
                }
            });

            // 5. DIBUJAR BALAS Y BOMBAS
            balas.forEach(b => {
                if (b.tipo === "BOMBA") {
                    ctx.fillStyle = "#ffff00";
                    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle = "#00ffcc";
                    ctx.fillRect(b.x, b.y, b.tipo === "FRENTE" ? 15 : 4, b.tipo === "FRENTE" ? 4 : 15);
                }
            });

            // 6. DIBUJAR OVNIS
            ctx.fillStyle = "#ffff00";
            ovnis.forEach(o => {
                ctx.beginPath();
                ctx.ellipse(o.x + o.ancho/2, o.y + o.alto/2, o.ancho/2, o.alto/2, 0, 0, Math.PI*2);
                ctx.fill();
                // Cúpula alienígenas
                ctx.fillStyle = "#00ffff";
                ctx.beginPath();
                ctx.arc(o.x + o.ancho/2, o.y + o.alto*0.3, 8, 0, Math.PI, true);
                ctx.fill();
                ctx.fillStyle = "#ffff00"; // Restaurar color
            });

            // 7. DIBUJAR EXPLOSIONES
            explosiones.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radio, 0, Math.PI * 2); ctx.fill();
            });

            // 8. DIBUJAR EL BUGGY (Nuestra nave/carro lunar con suspensión)
            if (estado === "JUGANDO") {
                ctx.fillStyle = "#ffffff";
                // Chasis principal del vehículo
                ctx.fillRect(buggy.x, buggy.y + 5, buggy.ancho, buggy.alto - 15);
                // Cabina superior
                ctx.fillStyle = "#00ff55";
                ctx.fillRect(buggy.x + 15, buggy.y, 25, 8);
                
                // Ruedas oscilantes mecánicas (Animación simulada)
                ctx.fillStyle = "#333333";
                let oscilacionRuedas = buggy.enSuelo ? Math.sin(Date.now() * 0.02) * 2 : 0;
                ctx.beginPath();
                ctx.arc(buggy.x + 10, buggy.y + buggy.alto - 4 + oscilacionRuedas, 7, 0, Math.PI * 2);
                ctx.arc(buggy.x + buggy.ancho / 2, buggy.y + buggy.alto - 4 - oscilacionRuedas, 7, 0, Math.PI * 2);
                ctx.arc(buggy.x + buggy.ancho - 10, buggy.y + buggy.alto - 4 + oscilacionRuedas, 7, 0, Math.PI * 2);
                ctx.fill();
            }

            // HUD INTERFAZ
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 16px 'Courier New', monospace";
            ctx.fillText("METERS: " + score + "m", 20, 40);
            ctx.fillText("SHIPS:  " + "🚀".repeat(vidas), 20, 70);

            // TEXTO INSTRUCTIVO EN PANTALLA TÁCTIL (Se desvanece al conseguir puntos)
            if (score < 400) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                ctx.font = "14px 'Courier New', monospace";
                ctx.fillText("← Toca Izquierda: SALTAR", 30, sueloY + 50);
                ctx.fillText("Toca Derecha: DISPARAR →", canvas.width - 240, sueloY + 50);
            }

            // GAME OVER
            if (estado === "GAMEOVER") {
                ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff0055";
                ctx.font = "bold 32px 'Courier New', monospace";
                ctx.textAlign = "center";
                ctx.fillText("MISIÓN FALLIDA", canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = "#ffffff";
                ctx.font = "16px 'Courier New', monospace";
                ctx.fillText("Distancia recorrida: " + score + " metros", canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText("Toca la pantalla para reintentar", canvas.width / 2, canvas.height / 2 + 60);
                ctx.textAlign = "left";
            }
        }

        function reiniciarJuego() {
            score = 0;
            vidas = 3;
            obstaculos = [];
            ovnis = [];
            balas = [];
            explosiones = [];
            buggy.y = sueloY - buggy.alto;
            buggy.vy = 0;
            estado = "JUGANDO";
        }

        function buclePrincipal(timestamp) {
            actualizar(timestamp);
            dibujar();
            requestAnimationFrame(buclePrincipal);
        }

        ajustarPantalla();
        window.addEventListener("resize", ajustarPantalla);
        requestAnimationFrame(buclePrincipal);
    </script>
</body>
</html>
